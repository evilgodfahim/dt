<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dhaka Tribune Feeds</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e2e4ed;font-family:'Segoe UI',system-ui,sans-serif}
header{background:#1a1d27;border-bottom:1px solid #2a2d3a;padding:14px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:1.1rem;font-weight:700;color:#ed1c24}.logo span{color:#e2e4ed}
.ts{margin-left:auto;font-size:.75rem;color:#7c8099}
.tabs{display:flex;gap:4px;padding:12px 20px 0;border-bottom:1px solid #2a2d3a;background:#1a1d27}
.tb{background:none;border:none;border-bottom:3px solid transparent;color:#7c8099;cursor:pointer;font:600 .88rem 'Segoe UI',sans-serif;padding:8px 16px 10px}
.tb:hover{color:#e2e4ed}.tb.active{color:#ed1c24;border-bottom-color:#ed1c24}
.badge{background:#2a2d3a;color:#7c8099;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px}
.panel{display:none;padding:20px;max-width:860px;margin:0 auto}.panel.active{display:block}
.msg{text-align:center;color:#7c8099;font-size:.88rem;padding:40px 0}
.err{color:#f87171!important}
.item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #2a2d3a;text-decoration:none;color:inherit;border-radius:8px;transition:background .12s}
.item:hover{background:#22263a;padding-left:8px;padding-right:8px;margin:0 -8px}
.item:last-child{border-bottom:none}
.tw{flex-shrink:0;width:110px;height:72px;border-radius:6px;overflow:hidden;background:#2a2d3a;display:flex;align-items:center;justify-content:center}
.tw img{width:100%;height:100%;object-fit:cover;display:block}
.nt{font-size:1.6rem;opacity:.3}
.ib{flex:1;min-width:0}
.it{font-size:.95rem;font-weight:600;line-height:1.4;margin-bottom:5px}
.is{font-size:.8rem;color:#7c8099;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.im{font-size:.72rem;color:#7c8099;margin-top:6px}
@media(max-width:500px){.tw{width:80px;height:56px}.is{-webkit-line-clamp:1}}
</style>
</head>
<body>

<header>
  <div class="logo">Dhaka<span>Tribune</span></div>
  <div class="ts" id="ts"></div>
</header>

<div class="tabs">
  <button class="tb active" data-tab="home">Home <span class="badge" id="bh">...</span></button>
  <button class="tb" data-tab="opinion">Opinion <span class="badge" id="bo">...</span></button>
</div>

<div class="panel active" id="panel-home"><div class="msg" id="sh">Loading...</div></div>
<div class="panel" id="panel-opinion"><div class="msg" id="so">Loading...</div></div>

<script>
document.querySelectorAll('.tb').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.tb').forEach(function(x){x.classList.remove('active');});
    document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    document.getElementById('panel-'+b.dataset.tab).classList.add('active');
  });
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rel(s){
  if(!s) return '';
  var d=new Date(s);
  if(isNaN(d)) return '';
  var n=(Date.now()-d)/1000;
  if(n<60) return 'just now';
  if(n<3600) return Math.floor(n/60)+'m ago';
  if(n<86400) return Math.floor(n/3600)+'h ago';
  return Math.floor(n/86400)+'d ago';
}

function render(panelId, msgId, badgeId, xml){
  var panel=document.getElementById(panelId);
  var msg=document.getElementById(msgId);
  var badge=document.getElementById(badgeId);

  var parser=new DOMParser();
  var doc=parser.parseFromString(xml,'text/xml');

  if(doc.querySelector('parsererror')){
    msg.textContent='XML parse error';
    msg.classList.add('err');
    return;
  }

  var items=Array.from(doc.getElementsByTagName('item'));
  badge.textContent=items.length;

  if(!items.length){
    msg.textContent='No items found.';
    return;
  }

  var frag=document.createDocumentFragment();

  items.forEach(function(item){
    function get(tag){
      var el=item.getElementsByTagName(tag)[0];
      return el ? el.textContent.trim() : '';
    }

    var title=get('title');
    var link=get('link')||get('guid');
    var summary=get('description');
    var pub=get('pubDate');

    // thumbnail - try all variants
    var thumb='';
    var thumbTags=['media:thumbnail','thumbnail'];
    for(var i=0;i<thumbTags.length;i++){
      var el=item.getElementsByTagName(thumbTags[i])[0];
      if(el){thumb=el.getAttribute('url')||'';break;}
    }
    if(!thumb){
      var contentTags=['media:content','content'];
      for(var i=0;i<contentTags.length;i++){
        var el=item.getElementsByTagName(contentTags[i])[0];
        if(el){thumb=el.getAttribute('url')||'';break;}
      }
    }

    var a=document.createElement('a');
    a.className='item';
    a.href=link||'#';
    a.target='_blank';
    a.rel='noopener noreferrer';

    var tw=document.createElement('div');
    tw.className='tw';
    if(thumb){
      var img=document.createElement('img');
      img.src=thumb;
      img.alt=title;
      img.loading='lazy';
      img.onerror=function(){tw.innerHTML='<div class="nt">NEWS</div>';};
      tw.appendChild(img);
    } else {
      tw.innerHTML='<div class="nt">NEWS</div>';
    }

    var ib=document.createElement('div');
    ib.className='ib';
    ib.innerHTML='<div class="it">'+esc(title)+'</div>'
      +(summary?'<div class="is">'+esc(summary)+'</div>':'')
      +'<div class="im">'+rel(pub)+'</div>';

    a.appendChild(tw);
    a.appendChild(ib);
    frag.appendChild(a);
  });

  panel.innerHTML='';
  panel.appendChild(frag);
}

function load(file, panelId, msgId, badgeId){
  fetch(file+'?_='+Date.now())
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(function(text){
      render(panelId, msgId, badgeId, text);
    })
    .catch(function(e){
      var el=document.getElementById(msgId);
      el.textContent='Could not load '+file+': '+e.message;
      el.classList.add('err');
      document.getElementById(badgeId).textContent='!';
    });
}

document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString();
load('home.xml','panel-home','sh','bh');
load('opinion.xml','panel-opinion','so','bo');
</script>
</body>
</html>
